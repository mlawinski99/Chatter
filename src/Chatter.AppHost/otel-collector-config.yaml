receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318

processors:
  resource:
    attributes:
      - action: insert
        key: loki.resource.labels
        value: service.name,service.instance.id

exporters:
  loki:
    endpoint: http://host.docker.internal:3100/loki/api/v1/push
    default_labels_enabled:
      exporter: false
      job: false
      instance: false
      level: true
  otlphttp/tempo:
    endpoint: http://host.docker.internal:4318
  prometheus:
    endpoint: 0.0.0.0:8889
    resource_to_telemetry_conversion:
      enabled: true

service:
  pipelines:
    logs:
      receivers: [otlp]
      processors: [resource]
      exporters: [loki]
    traces:
      receivers: [otlp]
      exporters: [otlphttp/tempo]
    metrics:
      receivers: [otlp]
      exporters: [prometheus]